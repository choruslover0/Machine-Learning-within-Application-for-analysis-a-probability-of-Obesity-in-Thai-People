<style>
  :root {
    --ink: #15151a;
    --muted: #71717a;
    --line: rgba(24, 24, 27, 0.12);
    --surface: rgba(255, 255, 255, 0.84);
    --hot: #e1306c;
    --sun: #f77737;
    --gold: #fcaf45;
    --violet: #833ab4;
    --blue: #405de6;
  }

  * { box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    min-height: 100vh;
    color: var(--ink);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:
      radial-gradient(circle at 16% 8%, rgba(252, 175, 69, 0.34), transparent 28%),
      radial-gradient(circle at 92% 18%, rgba(225, 48, 108, 0.30), transparent 25%),
      linear-gradient(135deg, #fff7ed 0%, #fff 38%, #f4f7fb 100%);
  }

  a { color: inherit; }

  main {
    width: min(1160px, calc(100vw - 32px));
    margin: 0 auto;
    padding: 28px 0 46px;
    animation: pageIn 520ms ease-out both;
  }

  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 18px;
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 12px 14px;
    background: rgba(255, 255, 255, 0.70);
    backdrop-filter: blur(18px);
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    font-weight: 1000;
  }

  .brand-logo {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(225, 48, 108, 0.22);
  }

  .nav-links {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .pill, .nav-links a {
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 8px 12px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 900;
    background: rgba(255, 255, 255, 0.72);
    text-decoration: none;
    transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
  }

  .nav-links a:hover, .pill:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 28px rgba(21, 21, 26, 0.10);
    background: rgba(255, 255, 255, 0.94);
  }

  .hero, .card, form {
    border: 1px solid var(--line);
    border-radius: 30px;
    background: var(--surface);
    box-shadow: 0 24px 70px rgba(21, 21, 26, 0.13);
    backdrop-filter: blur(18px);
    animation: cardIn 620ms ease-out both;
  }

  .hero {
    display: grid;
    grid-template-columns: minmax(0, 1.05fr) minmax(300px, 0.95fr);
    gap: 18px;
    padding: 22px;
    align-items: start;
  }

  .hero-copy {
    padding: 14px;
    align-self: start;
    margin-top: 28px;
  }

  .kicker {
    width: fit-content;
    border-radius: 999px;
    padding: 8px 12px;
    color: white;
    background: linear-gradient(135deg, var(--violet), var(--hot), var(--sun));
    font-size: 13px;
    font-weight: 1000;
  }

  h1 {
    margin: 16px 0 12px;
    font-size: clamp(42px, 7vw, 86px);
    line-height: 0.92;
    letter-spacing: 0;
  }

  h2 {
    margin: 0 0 12px;
    font-size: 27px;
    line-height: 1.05;
  }

  .lead {
    max-width: 620px;
    color: var(--muted);
    font-size: 18px;
  }

  .actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 22px;
  }

  .button {
    min-height: 48px;
    display: inline-grid;
    place-items: center;
    border-radius: 17px;
    padding: 0 18px;
    color: white;
    background: linear-gradient(135deg, var(--violet), var(--hot), var(--sun));
    box-shadow: 0 15px 35px rgba(225, 48, 108, 0.25);
    font-weight: 1000;
    text-decoration: none;
    transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
  }

  .button:hover, button:hover {
    transform: translateY(-2px) scale(1.01);
    filter: saturate(1.1);
  }

  .button:active, button:active, .nav-links a:active {
    transform: translateY(1px) scale(0.98);
  }

  .button.secondary {
    color: var(--ink);
    background: rgba(255, 255, 255, 0.76);
    box-shadow: none;
    border: 1px solid var(--line);
  }

  .action-form {
    display: inline;
    padding: 0;
    border: 0;
    border-radius: 0;
    background: transparent;
    box-shadow: none;
    backdrop-filter: none;
    animation: none;
  }

  .action-form button {
    width: auto;
    min-height: 48px;
    margin-top: 0;
    padding: 0 18px;
  }

  .phone-preview {
    border-radius: 34px;
    padding: 18px;
    background: #141417;
    color: white;
    min-height: 430px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.1);
  }

  .avatar {
    width: 112px;
    height: 112px;
    border-radius: 50%;
    padding: 5px;
    margin: 10px auto 16px;
    background: conic-gradient(from 220deg, var(--gold), var(--sun), var(--hot), var(--violet), var(--gold));
  }

  .avatar-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background: white;
    color: var(--ink);
    font-size: 36px;
    font-weight: 1000;
  }

  .beast-mark {
    width: min(190px, 68vw);
    aspect-ratio: 1;
    display: block;
    margin: 8px auto 16px;
    border-radius: 34px;
    box-shadow: 0 22px 52px rgba(225, 48, 108, 0.28);
  }

  .mini-stat {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin: 18px 0;
  }

  .mini-stat div {
    border-radius: 16px;
    padding: 12px 6px;
    background: rgba(255,255,255,.1);
    text-align: center;
  }

  .mini-stat strong { display: block; font-size: 21px; }
  .mini-stat span { color: rgba(255,255,255,.68); font-size: 12px; }

  .story {
    display: grid;
    grid-template-columns: 42px 1fr;
    gap: 14px;
    align-items: center;
    border-radius: 18px;
    padding: 10px;
    background: rgba(255,255,255,.09);
    margin-top: 9px;
    transition: transform 180ms ease, background 180ms ease;
  }

  .story:hover { transform: translateX(4px); background: rgba(255,255,255,.14); }

  .story > div:last-child {
    display: flex;
    align-items: baseline;
    gap: 9px;
    min-width: 0;
    flex-wrap: wrap;
  }

  .story strong {
    flex: 0 0 auto;
  }

  .story span {
    color: rgba(255,255,255,.78);
    line-height: 1.35;
  }

  .story-icon {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-weight: 1000;
    background: linear-gradient(135deg, var(--hot), var(--sun));
  }

  .section-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
    margin-top: 18px;
  }

  .support-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .advice-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
    margin-top: 18px;
  }

  .advice-card {
    border: 1px solid rgba(225, 48, 108, 0.18);
  }

  .advice-card .pill {
    display: inline-block;
    margin-bottom: 12px;
  }

  .source-list {
    display: grid;
    gap: 10px;
    margin-top: 12px;
  }

  .source-list a {
    color: var(--blue);
    font-weight: 900;
  }

  .producers-section {
    margin-top: 22px;
    padding: 4px 0 0;
  }

  .producer-heading {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    align-items: end;
    margin-bottom: 14px;
  }

  .producer-heading h2 {
    margin: 0;
    font-size: clamp(30px, 5vw, 52px);
    line-height: 0.96;
    letter-spacing: 0;
  }

  .producer-heading p {
    max-width: 430px;
    margin: 0;
    color: var(--muted);
    font-weight: 750;
    line-height: 1.45;
  }

  .producer-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
  }

  .producer-card {
    position: relative;
    overflow: hidden;
    min-height: 448px;
    border: 1px solid rgba(225, 48, 108, 0.18);
    border-radius: 26px;
    background: rgba(255, 255, 255, 0.74);
    box-shadow: 0 24px 70px rgba(21, 21, 26, 0.12);
    transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
  }

  .producer-card:hover {
    transform: translateY(-4px);
    border-color: rgba(225, 48, 108, 0.30);
    box-shadow: 0 34px 90px rgba(21, 21, 26, 0.18);
  }

  .producer-photo-wrap {
    height: 292px;
    overflow: hidden;
    background: #f4f4f5;
  }

  .producer-photo {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 420ms ease;
  }

  .producer-card:hover .producer-photo {
    transform: scale(1.04);
  }

  .photo-phawich {
    object-position: center 28%;
  }

  .photo-watcharawee {
    object-position: 72% 48%;
  }

  .photo-paphawin {
    object-position: 53% 34%;
  }

  .producer-body {
    padding: 16px;
  }

  .producer-body h3 {
    margin: 0;
    font-size: clamp(20px, 2.5vw, 28px);
    line-height: 1.05;
  }

  .producer-body p {
    margin: 8px 0 14px;
    color: var(--muted);
    font-weight: 850;
  }

  .contact-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .contact-link, .contact-slot {
    min-height: 40px;
    border-radius: 999px;
    padding: 10px 12px;
    font-size: 13px;
    font-weight: 1000;
    text-decoration: none;
    line-height: 1;
  }

  .contact-link {
    color: white;
    background: linear-gradient(135deg, var(--violet), var(--hot), var(--sun));
    box-shadow: 0 14px 28px rgba(225, 48, 108, 0.20);
  }

  .contact-slot {
    display: inline-flex;
    align-items: center;
    color: var(--muted);
    border: 1px dashed rgba(113, 113, 122, 0.44);
    background: rgba(255, 255, 255, 0.62);
  }

  .card {
    padding: 18px;
    transition: transform 200ms ease, box-shadow 200ms ease, border-color 200ms ease;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 30px 80px rgba(21, 21, 26, 0.16);
    border-color: rgba(225, 48, 108, 0.24);
  }

  .card p, .note {
    color: var(--muted);
    line-height: 1.5;
  }

  .method-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .method {
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 13px;
    background: rgba(255, 255, 255, 0.70);
    transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
  }

  .method:hover {
    transform: translateY(-2px);
    background: rgba(255, 255, 255, 0.94);
    border-color: rgba(225, 48, 108, 0.22);
  }

  .method strong { display: block; margin-bottom: 5px; }
  .method span { color: var(--muted); font-size: 13px; line-height: 1.35; }

  .preparation-block {
    margin: 26px 0;
    padding: 20px 0 24px;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }

  .preparation-heading, .algorithm-heading {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: 16px;
  }

  .preparation-heading h2, .algorithm-heading h2 { margin: 0; }

  .preparation-heading p, .algorithm-heading p {
    max-width: 520px;
    margin: 0;
    color: var(--muted);
    line-height: 1.5;
  }

  .preparation-flow {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 52px minmax(0, 1fr) 52px minmax(0, 1fr);
    gap: 10px;
    align-items: center;
  }

  .preparation-step {
    min-height: 124px;
    display: grid;
    align-content: center;
    gap: 7px;
    padding: 16px;
    border: 1px solid var(--line);
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.72);
  }

  .preparation-step strong { font-size: 18px; }

  .preparation-step span {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.4;
  }

  .preparation-icon {
    width: 38px;
    height: 38px;
    display: grid;
    place-items: center;
    border-radius: 12px;
    color: white;
    background: var(--forest, var(--violet));
    font-weight: 1000;
  }

  .preparation-arrow {
    color: var(--green, var(--violet));
    font-size: 25px;
    font-weight: 1000;
    text-align: center;
  }

  .predict-layout {
    display: grid;
    grid-template-columns: minmax(300px, 0.72fr) minmax(0, 1.28fr);
    gap: 22px;
    align-items: start;
  }

  .profile {
    position: sticky;
    top: 24px;
    padding: 22px;
  }

  form { padding: 22px; }

  .form-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  label {
    display: grid;
    gap: 8px;
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 13px;
    background: rgba(255, 255, 255, 0.72);
    color: #3f3f46;
    font-size: 13px;
    font-weight: 900;
  }

  input, select {
    width: 100%;
    min-height: 42px;
    border: 0;
    border-radius: 12px;
    padding: 8px 10px;
    color: var(--ink);
    background: #f4f4f5;
    font: inherit;
    font-size: 16px;
    outline: none;
  }

  input:focus, select:focus {
    box-shadow: 0 0 0 3px rgba(225, 48, 108, 0.18);
    background: #fff;
  }

  button {
    width: 100%;
    min-height: 52px;
    margin-top: 18px;
    border: 0;
    border-radius: 18px;
    color: white;
    background: linear-gradient(135deg, var(--violet), var(--hot), var(--sun));
    box-shadow: 0 15px 35px rgba(225, 48, 108, 0.25);
    font: inherit;
    font-size: 16px;
    font-weight: 1000;
    cursor: pointer;
    transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
  }

  .ring {
    width: 220px;
    height: 220px;
    margin: 0 auto 22px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background:
      radial-gradient(circle closest-side, #fff 72%, transparent 73%),
      conic-gradient(#e1306c var(--percent), #ede9e4 0);
    box-shadow: inset 0 0 0 1px rgba(24, 24, 27, 0.08);
  }

  .prob {
    font-size: 48px;
    font-weight: 1000;
  }

  .feed-output {
    margin-top: 16px;
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 16px;
    background: rgba(255, 255, 255, 0.72);
  }

  .feed-output[hidden] {
    display: none;
  }

  .feed-output .ring {
    width: 154px;
    height: 154px;
    margin-bottom: 12px;
  }

  .feed-output .prob {
    font-size: 34px;
  }

  .feed-meta {
    display: grid;
    gap: 7px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.35;
  }

  .result-card {
    width: min(560px, 100%);
    margin: 88px auto 34px;
    padding: 24px;
    text-align: center;
  }

  .result-card .ring {
    margin: 28px auto 24px;
  }

  .band {
    width: fit-content;
    margin: 24px auto 26px;
    border-radius: 999px;
    padding: 9px 14px;
    color: white;
    background: linear-gradient(135deg, var(--violet), var(--hot), var(--sun));
    font-weight: 1000;
  }



  .algorithm-lab {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
    margin-top: 18px;
  }

  .research-map {
    display: grid;
    grid-template-columns: minmax(0, 1.05fr) minmax(280px, 0.95fr);
    gap: 18px;
    align-items: center;
    margin-top: 18px;
    padding: 18px;
    border: 1px solid rgba(225, 48, 108, 0.18);
    border-radius: 26px;
    background:
      linear-gradient(135deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.54)),
      radial-gradient(circle at 88% 12%, rgba(64, 93, 230, 0.16), transparent 30%);
    overflow: hidden;
  }

  .pipeline-stack {
    display: grid;
    gap: 12px;
  }

  .pipeline-step {
    display: grid;
    grid-template-columns: 42px 1fr;
    gap: 12px;
    align-items: center;
    min-height: 74px;
    padding: 13px;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.74);
    box-shadow: 0 18px 34px rgba(21, 21, 26, 0.09);
    transform: perspective(900px) rotateX(3deg) rotateY(-5deg);
  }

  .pipeline-step span {
    display: grid;
    place-items: center;
    width: 42px;
    height: 42px;
    border-radius: 14px;
    color: white;
    background: linear-gradient(135deg, var(--violet), var(--hot), var(--sun));
    font-weight: 1000;
    box-shadow: 0 12px 24px rgba(225, 48, 108, 0.24);
  }

  .pipeline-step strong {
    display: block;
    font-size: 16px;
    line-height: 1.15;
  }

  .pipeline-step small {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    font-weight: 750;
    line-height: 1.35;
  }

  .cube-scene {
    min-height: 318px;
    display: grid;
    place-items: center;
    position: relative;
    perspective: 900px;
  }

  .cube-title {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    font-weight: 1000;
  }

  .cube-legend {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 4px;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .cube-legend span {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 7px 9px;
    color: var(--muted);
    background: rgba(255, 255, 255, 0.88);
    font-size: 11px;
    font-weight: 1000;
    box-shadow: 0 12px 24px rgba(21, 21, 26, 0.08);
  }

  .cube-legend i {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--blue);
  }

  .cube-legend span:last-child i {
    background: var(--hot);
  }

  .cube-box {
    position: relative;
    width: min(280px, 84vw);
    height: 230px;
    transform-style: preserve-3d;
    transform: rotateX(60deg) rotateZ(-38deg);
    animation: cubeDrift 4.5s ease-in-out infinite alternate;
  }

  .cube-face {
    position: absolute;
    border: 1px solid rgba(24, 24, 27, 0.12);
    background: rgba(255, 255, 255, 0.36);
    box-shadow: inset 0 0 32px rgba(64, 93, 230, 0.08);
  }

  .cube-floor {
    inset: 38px 20px 20px;
    border-radius: 20px;
  }

  .cube-back {
    left: 20px;
    top: 18px;
    width: calc(100% - 40px);
    height: 112px;
    transform: rotateX(72deg) translateY(-86px);
    transform-origin: top;
    border-radius: 18px;
  }

  .cube-side {
    right: 20px;
    top: 38px;
    width: 112px;
    height: calc(100% - 58px);
    transform: rotateY(72deg) translateX(86px);
    transform-origin: right;
    border-radius: 18px;
  }

  .decision-sheet {
    position: absolute;
    left: 92px;
    top: 44px;
    width: 106px;
    height: 150px;
    border: 2px solid rgba(225, 48, 108, 0.56);
    border-radius: 18px;
    background: linear-gradient(135deg, rgba(225, 48, 108, 0.18), rgba(252, 175, 69, 0.08));
    transform: rotateY(65deg) rotateZ(6deg);
    box-shadow: 0 18px 38px rgba(225, 48, 108, 0.12);
  }

  .cube-point {
    position: absolute;
    z-index: 3;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: var(--blue);
    box-shadow: 0 0 0 5px rgba(64, 93, 230, 0.14), 0 16px 18px rgba(21, 21, 26, 0.18);
  }

  .cube-point.hot {
    background: var(--hot);
    box-shadow: 0 0 0 5px rgba(225, 48, 108, 0.14), 0 16px 18px rgba(21, 21, 26, 0.18);
  }

  .cube-point.synthetic {
    background: #22c55e;
    box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.16), 0 16px 18px rgba(21, 21, 26, 0.18);
  }

  .algo-card {
    min-height: 316px;
    overflow: hidden;
  }

  .algo-visual {
    height: 154px;
    border: 1px solid var(--line);
    border-radius: 18px;
    background:
      linear-gradient(90deg, rgba(24,24,27,.06) 1px, transparent 1px) 0 0 / 28px 28px,
      linear-gradient(0deg, rgba(24,24,27,.06) 1px, transparent 1px) 0 0 / 28px 28px,
      rgba(255, 255, 255, 0.76);
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }

  .algo-visual::before {
    content: "";
    position: absolute;
    inset: 14px;
    border-left: 2px solid rgba(24,24,27,.16);
    border-bottom: 2px solid rgba(24,24,27,.16);
    pointer-events: none;
  }

  .logistic-svg {
    position: absolute;
    inset: 8px;
    width: calc(100% - 16px);
    height: calc(100% - 16px);
    z-index: 1;
  }

  .logistic-svg text {
    font-family: inherit;
    font-weight: 900;
    fill: var(--muted);
  }

  .viz-chip {
    position: absolute;
    z-index: 2;
    border-radius: 999px;
    padding: 5px 8px;
    color: var(--ink);
    background: rgba(255, 255, 255, 0.90);
    border: 1px solid var(--line);
    font-size: 11px;
    font-weight: 1000;
    box-shadow: 0 8px 18px rgba(21, 21, 26, 0.08);
  }

  .viz-chip.hot {
    color: white;
    border: 0;
    background: linear-gradient(135deg, var(--hot), var(--sun));
  }

  .viz-chip.cool {
    color: white;
    border: 0;
    background: linear-gradient(135deg, var(--blue), var(--violet));
  }

  .viz-arrow {
    position: absolute;
    z-index: 1;
    height: 2px;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--violet), var(--hot), var(--sun));
    transform-origin: left center;
    opacity: 0.58;
    box-shadow: none;
  }

  .viz-arrow::after {
    content: "";
    position: absolute;
    right: -1px;
    top: 50%;
    width: 7px;
    height: 7px;
    border-top: 2px solid var(--sun);
    border-right: 2px solid var(--sun);
    transform: translateY(-50%) rotate(45deg);
    display: none;
  }

  .flow-step {
    position: absolute;
    display: grid;
    place-items: center;
    width: 42px;
    height: 42px;
    border-radius: 13px;
    color: white;
    background: linear-gradient(135deg, var(--violet), var(--hot));
    font-size: 12px;
    font-weight: 1000;
    box-shadow: 0 12px 28px rgba(225, 48, 108, 0.20);
    animation: nodePop 2.2s ease-in-out infinite;
  }

  .algo-points {
    display: grid;
    gap: 7px;
    margin-top: 12px;
  }

  .algo-point {
    display: grid;
    grid-template-columns: 22px 1fr;
    gap: 8px;
    align-items: start;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.35;
  }

  .algo-point strong {
    display: grid;
    place-items: center;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    color: white;
    background: linear-gradient(135deg, var(--hot), var(--sun));
    font-size: 11px;
  }

  .dot {
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--hot);
    box-shadow: 0 0 0 4px rgba(225, 48, 108, 0.14);
    animation: dotPulse 1.9s ease-in-out infinite;
  }

  .dot.ghost {
    width: 10px;
    height: 10px;
    background: #22c55e;
    box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.16);
    opacity: 0.92;
  }

  .dot.alt {
    background: var(--blue);
    box-shadow: 0 0 0 4px rgba(64, 93, 230, 0.14);
    animation-delay: 260ms;
  }

  .line-viz {
    position: absolute;
    left: 12%;
    right: 12%;
    top: 50%;
    height: 4px;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--violet), var(--hot), var(--sun));
    transform: rotate(-14deg);
    animation: scanLine 2.4s ease-in-out infinite alternate;
  }

  .line-viz.vertical {
    width: 4px;
    height: 112px;
    left: 50%;
    right: auto;
    top: 18px;
    transform: rotate(12deg);
  }

  .tree-viz {
    position: absolute;
    inset: 16px;
    background:
      linear-gradient(var(--hot), var(--hot)) 50% 16px / 3px 32px no-repeat,
      linear-gradient(135deg, transparent 47%, var(--sun) 48%, var(--sun) 52%, transparent 53%) 50% 42px / 110px 34px no-repeat,
      linear-gradient(45deg, transparent 47%, var(--blue) 48%, var(--blue) 52%, transparent 53%) 50% 42px / 110px 34px no-repeat;
  }

  .node {
    position: absolute;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    color: white;
    font-size: 11px;
    font-weight: 1000;
    background: linear-gradient(135deg, var(--violet), var(--hot));
    animation: nodePop 2.2s ease-in-out infinite;
  }

  .bars {
    display: grid;
    gap: 8px;
    margin-top: 24px;
  }

  .bar-row {
    display: grid;
    grid-template-columns: minmax(210px, 0.42fr) minmax(150px, 1fr) 52px;
    gap: 12px;
    align-items: center;
    color: var(--muted);
    font-size: 13px;
    font-weight: 800;
  }

  .bar-row span {
    min-width: 0;
    overflow-wrap: anywhere;
    line-height: 1.15;
  }

  .bar-track {
    height: 12px;
    border-radius: 999px;
    background: #eceff3;
    overflow: hidden;
  }

  .bar-fill {
    width: var(--score);
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, var(--violet), var(--hot), var(--sun));
    animation: growBar 900ms ease-out both;
  }

  .reason-box {
    border: 1px solid rgba(225, 48, 108, 0.22);
    border-radius: 22px;
    padding: 16px;
    background: rgba(255, 255, 255, 0.80);
    text-align: left;
  }

  .reason-box p {
    margin: 0 0 16px;
  }

  .reason-box p:last-child {
    margin-bottom: 0;
  }

  .table-wrapper {
    margin-top: 12px;
    width: 100%;
    max-width: 100%;
    overflow: hidden;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.72);
  }

  .metric-table {
    width: 100%;
    table-layout: fixed;
    border-collapse: collapse;
    color: var(--muted);
    font-size: clamp(10px, 1.7vw, 13px);
    text-align: left;
  }

  .metric-table th, .metric-table td {
    padding: 12px 10px;
    border-bottom: 1px solid var(--line);
    vertical-align: middle;
  }

  .metric-table tr:last-child td {
    border-bottom: none;
  }

  .metric-table th {
    background: rgba(255, 255, 255, 0.78);
    font-weight: 900;
    color: var(--ink);
    padding: 14px 10px;
    white-space: nowrap;
  }

  .metric-table abbr {
    text-decoration: none;
    cursor: help;
  }

  .metric-table td:first-child {
    font-weight: 600;
    color: var(--ink);
    overflow-wrap: anywhere;
    word-break: break-word;
  }

  .metric-table th:not(:first-child),
  .metric-table td:not(:first-child) {
    text-align: center;
  }

  .metric-table col:first-child {
    width: 42%;
  }

  .metric-table col:not(:first-child) {
    width: 14.5%;
  }

  @media (max-width: 640px) {
    .metric-table th, .metric-table td {
      padding: 10px 6px;
    }

    .metric-table {
      font-size: 10px;
    }
  }

  @keyframes pageIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes dotPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.24); }
  }

  @keyframes scanLine {
    from { transform: rotate(-18deg) translateX(-8px); }
    to { transform: rotate(-8deg) translateX(8px); }
  }

  @keyframes nodePop {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }

  @keyframes growBar {
    from { width: 0; }
    to { width: var(--score); }
  }

  @keyframes cubeDrift {
    from { transform: rotateX(60deg) rotateZ(-38deg) translate3d(-2px, 0, 0); }
    to { transform: rotateX(57deg) rotateZ(-34deg) translate3d(8px, -4px, 0); }
  }

  @property --percent {
    syntax: '<percentage>';
    inherits: false;
    initial-value: 0%;
  }

  .ring {
    transition: --percent 1100ms cubic-bezier(0.22, 1, 0.36, 1);
  }

  @keyframes bandIn {
    from { opacity: 0; transform: scale(0.72) translateY(6px); }
    to   { opacity: 1; transform: scale(1)    translateY(0);   }
  }

  .result-card .band {
    animation: bandIn 480ms cubic-bezier(0.34, 1.56, 0.64, 1) 860ms both;
  }

  @media (max-width: 920px) {
    .hero, .predict-layout, .section-grid, .algorithm-lab, .advice-grid, .research-map, .producer-grid { grid-template-columns: 1fr; }

    .producer-heading p { margin-top: 10px; }
    .profile { position: static; }
  }

  @media (max-width: 640px) {
    main { width: min(100vw - 18px, 1160px); padding-top: 12px; }
    .grid, .method-grid { grid-template-columns: 1fr; }
    .preparation-heading, .algorithm-heading { display: grid; }
    .preparation-flow { grid-template-columns: 1fr; }
    .preparation-arrow { transform: rotate(90deg); }
    .hero, .card, form { border-radius: 22px; padding: 16px; }
    h1 { font-size: 42px; }
    .bar-row { grid-template-columns: 1fr; gap: 5px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 1ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 1ms !important;
      scroll-behavior: auto !important;
    }
  }
